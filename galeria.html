<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./estilos/estilos.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Galería - L'Aquàrium Barcelona</title>
</head>
<body>
    <div class="container-fluid">
        <header class="py-3">
            <img src="./imagenes/LAquarium-Barcelona-800x445.jpg" alt="logo oficial aquarium bcn" width="560" class="img-fluid banner" />
            <h1 class="mt-2">GALERÍA FOTOGRÁFICA</h1>
        </header>

        <div class="row">
            <!-- Menú Lateral -->
            <div class="col-sm-2">
                <nav class="nav flex-column">
                    <ul class="list-unstyled">
                        <li><a href="index.html" class="btn btn-outline-primary w-100 mb-2">Inicio</a></li>
                        <li><a href="especies.html" class="btn btn-outline-primary w-100 mb-2">Especies</a></li>
                        <li><a href="exhibicion.html" class="btn btn-outline-primary w-100 mb-2">Exhibición</a></li>
                        <li><a href="galeria.html" class="btn btn-outline-primary w-100 mb-2">Galeria</a></li>
                        <li><a href="visita.html" class="btn btn-outline-primary w-100 mb-2">Visita</a></li>
                    </ul>
                </nav>
            </div>

            <!-- Contenido Principal (Galería) -->
            <div class="col-sm-10">
                <p class="lead">Estas son alguna de las fotos de los animales que verás en el recinto:</p>
                
                <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
                    <!-- Tiburón -->
                    <div class="col text-center">
                        <img src="./imagenes/bullshark1-1024x819.webp" alt="tiburon-toro" class="img-fluid rounded shadow-sm mb-2" />

                    </div>

                    <div class="col text-center">

                    <div class="col text-center">
                        <img src="./imagenes/images.jpg" alt="raya-comun" class="img-fluid rounded shadow-sm mb-2" />
                        <p class="fw-bold">Raya común</p>
                    </div>

                    <!-- Caballito -->
                    <div class="col text-center">
                        <img src="./imagenes/thumbnail-aclean.jpg" alt="caballito-de-mar" class="img-fluid rounded shadow-sm mb-2" />
                        <p class="fw-bold">Caballito de mar</p>
                    </div>

        <footer class="footer mt-5 py-3 border-top">
